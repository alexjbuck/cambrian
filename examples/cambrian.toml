# Example cambrian config for the walkthrough.
#
# `cambrian.toml` is normally next to your `current.sql` and `committed/`
# directory. Run `cambrian` from this directory (or pass --path) and the
# relative `dir = "."` resolves to the directory you're in.

[catalog]
# The values under [catalog] are passed straight through to PyIceberg's
# `load_catalog()`. Anything PyIceberg accepts for a REST catalog goes here.
type      = "rest"
uri       = "http://localhost:9181/catalog"
warehouse = "cambrian-example"

# S3 endpoint (rustfs) + static credentials. In real life these belong in
# the environment, not the file - see the commented-out block below for
# the production pattern.
"s3.endpoint"          = "http://localhost:9001"
"s3.access-key-id"     = "cambrian-access-key"
"s3.secret-access-key" = "cambrian-secret-key"
"s3.region"            = "local"
"s3.path-style-access" = "true"

# Production pattern: resolve secrets from the environment via ${VAR}.
# `cambrian` substitutes ${VAR} references at load time and fails loud
# if any are unset. Literal `${...}` is `$${...}` (make-style escape).
#
# token                 = "${CAMBRIAN_CATALOG_TOKEN}"
# "s3.access-key-id"    = "${AWS_ACCESS_KEY_ID}"
# "s3.secret-access-key"= "${AWS_SECRET_ACCESS_KEY}"

[evolutions]
# Where `current.sql` and `committed/*.sql` live. Relative to the cwd
# `cambrian` is invoked from.
dir               = "."
sidecar_namespace = "_cambrian"

[dev]
# Idempotent is the default and the safety contract. `reset` is opt-in for
# evolutions that genuinely can't be expressed idempotently.
mode        = "idempotent"
watch       = true
debounce_ms = 500
