name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    name: lint + type + unit (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Pin Python ${{ matrix.python-version }}
        run: uv python pin ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --frozen

      - name: ruff check
        run: uv run ruff check src tests

      - name: ruff format --check
        run: uv run ruff format --check src tests

      - name: ty check
        run: uv run ty check src tests

      - name: pytest (unit)
        run: uv run pytest tests/unit -n auto

  integration:
    name: integration (docker-compose rig)
    needs: lint-type-test
    runs-on: ubuntu-latest
    # Single Python pin: the integration suite exercises Lakekeeper +
    # rustfs over docker-compose, so the matrix sweep from lint-type-test
    # would add cost without value.
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Pin Python 3.12
        run: uv python pin 3.12

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Verify docker compose is available
        run: docker compose version

      - name: Map host.docker.internal to localhost
        # The rustfs storage endpoint vended to clients is
        # http://host.docker.internal:9000 so that both the lakekeeper
        # container (via host-gateway) and the host-side test process
        # resolve to the same place. Docker Desktop populates this entry
        # on macOS/Windows automatically; Linux GHA runners do not.
        run: echo "127.0.0.1 host.docker.internal" | sudo tee -a /etc/hosts

      - name: pytest (integration)
        # The fixture brings the stack up with docker compose up -d
        # (no --wait, see conftest for the rationale) and tears it down
        # on exit, so no separate compose step is needed.
        run: uv run pytest tests/integration -v

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f docker/compose.yml logs --no-color || true
