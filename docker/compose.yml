# Integration-test rig for cambrian.
#
# Services:
#   postgres        - backing store for Lakekeeper's metadata
#   rustfs          - S3-compatible object storage (warehouse data lives here)
#   rustfs-init     - one-shot: creates the warehouse bucket on rustfs
#   lakekeeper-migrate - one-shot: runs lakekeeper's schema migrations
#   lakekeeper      - Iceberg REST catalog
#   bootstrap       - one-shot: POSTs /bootstrap and /warehouse to Lakekeeper
#
# Version pins (chosen 2026-05-25):
#   postgres:17               - latest stable
#   rustfs/rustfs:1.0.0-beta.4 - newest pre-1.0 (rustfs has no GA yet; betas
#                               are what's shipped on Docker Hub)
#   quay.io/lakekeeper/catalog:v0.12.2 - latest stable GitHub release

name: cambrian-test

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: lakekeeper
      POSTGRES_PASSWORD: lakekeeper
      POSTGRES_DB: lakekeeper
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lakekeeper -d lakekeeper"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
    ports:
      - "5432:5432"
    networks:
      - cambrian

  rustfs:
    image: rustfs/rustfs:1.0.0-beta.4
    environment:
      RUSTFS_ACCESS_KEY: cambrian-access-key
      RUSTFS_SECRET_KEY: cambrian-secret-key
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_CONSOLE_ENABLE: "false"
    healthcheck:
      # rustfs exposes its S3 API on :9000; a simple HEAD probes the
      # endpoint without authentication.
      test: ["CMD-SHELL", "curl -fsS -o /dev/null -w '%{http_code}' http://localhost:9000/ | grep -E '^(200|403)$'"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s
    ports:
      - "9000:9000"
    networks:
      - cambrian

  rustfs-init:
    image: amazon/aws-cli:2.17.16
    depends_on:
      rustfs:
        condition: service_healthy
    restart: "no"
    environment:
      AWS_ACCESS_KEY_ID: cambrian-access-key
      AWS_SECRET_ACCESS_KEY: cambrian-secret-key
      AWS_DEFAULT_REGION: local
      AWS_EC2_METADATA_DISABLED: "true"
    # Idempotent: tolerate BucketAlreadyOwnedByYou and BucketAlreadyExists.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        echo "[rustfs-init] creating bucket s3://cambrian-warehouse on rustfs ..."
        out=$$(aws --endpoint-url http://rustfs:9000 s3api create-bucket --bucket cambrian-warehouse 2>&1) && rc=0 || rc=$$?
        echo "$$out"
        if [ "$$rc" -eq 0 ]; then
          echo "[rustfs-init] bucket created"
          exit 0
        fi
        if echo "$$out" | grep -qE 'BucketAlreadyOwnedByYou|BucketAlreadyExists'; then
          echo "[rustfs-init] bucket already exists - OK"
          exit 0
        fi
        echo "[rustfs-init] FAILED to create bucket (rc=$$rc)"
        exit "$$rc"
    networks:
      - cambrian

  lakekeeper-migrate:
    image: &lakekeeper-image quay.io/lakekeeper/catalog:v0.12.2
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    environment: &lakekeeper-env
      LAKEKEEPER__PG_ENCRYPTION_KEY: "cambrian-test-only-not-secure"
      LAKEKEEPER__PG_DATABASE_URL_READ: "postgresql://lakekeeper:lakekeeper@postgres:5432/lakekeeper"
      LAKEKEEPER__PG_DATABASE_URL_WRITE: "postgresql://lakekeeper:lakekeeper@postgres:5432/lakekeeper"
      LAKEKEEPER__AUTHZ_BACKEND: "allowall"
      RUST_LOG: "info"
    command: ["migrate"]
    networks:
      - cambrian

  lakekeeper:
    image: *lakekeeper-image
    depends_on:
      lakekeeper-migrate:
        condition: service_completed_successfully
      rustfs:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
    environment: *lakekeeper-env
    command: ["serve"]
    # Lakekeeper validates the warehouse storage endpoint by *connecting*
    # to it at warehouse-creation time, AND it vends that endpoint to
    # clients. The same endpoint string therefore needs to resolve both
    # from inside the docker network (lakekeeper -> rustfs) and from the
    # host (tests -> rustfs). ``host.docker.internal`` solves this on
    # macOS Docker Desktop (auto) and on Linux via ``host-gateway`` here,
    # provided the runner has ``127.0.0.1 host.docker.internal`` in
    # ``/etc/hosts`` (Docker Desktop does this by default; CI adds it
    # in the workflow).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "/home/nonroot/lakekeeper", "healthcheck"]
      interval: 2s
      timeout: 10s
      retries: 15
      start_period: 5s
    ports:
      - "8181:8181"
    networks:
      - cambrian

  bootstrap:
    image: curlimages/curl:8.10.1
    depends_on:
      lakekeeper:
        condition: service_healthy
    restart: "no"
    environment:
      LAKEKEEPER_URL: http://lakekeeper:8181
      WAREHOUSE_NAME: cambrian
      # In-network endpoint - used only for the rustfs-init bucket-create
      # step (which runs inside the docker network).
      RUSTFS_ENDPOINT: http://rustfs:9000
      # Endpoint vended to clients in the warehouse storage profile.
      # Must work from BOTH lakekeeper (in the docker network, via
      # host-gateway extra_host) AND test processes on the host (via
      # the published 9000 port). See the lakekeeper service for the
      # extra_hosts trick that makes this work on Linux.
      CLIENT_RUSTFS_ENDPOINT: http://host.docker.internal:9000
      RUSTFS_BUCKET: cambrian-warehouse
      RUSTFS_ACCESS_KEY: cambrian-access-key
      RUSTFS_SECRET_KEY: cambrian-secret-key
      RUSTFS_REGION: local
    volumes:
      - ./bootstrap.sh:/bootstrap.sh:ro
    entrypoint: ["/bin/sh", "/bootstrap.sh"]
    networks:
      - cambrian

networks:
  cambrian:
    name: cambrian-test
